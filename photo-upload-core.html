<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"
/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script>
  console.log("[photo-upload-core] v2026-05-29.2");
  window.PhotoUploader = (function () {
    const SAFE_AREA_PERCENTAGE = 0.9;
    const OUTPUT_MIN_SHORT_SIDE = 2000;
    // Rectangle magnet aspect ratio (wider:narrower). Update this one value
    // to retune all rectangle variants + the replacement page.
    // 83mm × 59mm = physical print size including wrap (54×78mm product + ~5mm wrap all sides).
    const RECTANGLE_RATIO = 83 / 59;

    // Draws the safe-print-area overlay over the image inside the given
    // container. The container must be position:relative and contain an <img>
    // with object-fit:contain. Removes any existing overlays first so this can
    // be called repeatedly (e.g. on resize).
    function drawSafeAreaOverlay(container, safeXFrac, safeYFrac) {
      safeXFrac = safeXFrac !== undefined ? safeXFrac : SAFE_AREA_PERCENTAGE;
      safeYFrac = safeYFrac !== undefined ? safeYFrac : SAFE_AREA_PERCENTAGE;
      container
        .querySelectorAll(".safe-area-overlay")
        .forEach((el) => el.remove());
      const img = container.querySelector("img");
      if (!img || !img.complete || !img.naturalWidth) return;
      const cW = container.clientWidth;
      const cH = container.clientHeight;
      const iW = img.clientWidth;
      const iH = img.clientHeight;
      if (!iW || !iH) return;
      const imgLeft = (cW - iW) / 2;
      const imgTop = (cH - iH) / 2;
      const safeW = iW * safeXFrac;
      const safeH = iH * safeYFrac;
      const marginX = (iW - safeW) / 2;
      const marginY = (iH - safeH) / 2;
      const safeLeft = imgLeft + marginX;
      const safeTop = imgTop + marginY;

      // Dimming overlays constrained to image bounds (letterbox stays
      // undimmed). Static styling: .safe-area-overlay / .safe-area-border.
      const topO = document.createElement("div");
      topO.className = "safe-area-overlay";
      topO.style.cssText = `top:${imgTop}px;left:${imgLeft}px;width:${iW}px;height:${marginY}px;`;
      container.appendChild(topO);

      const bottomO = document.createElement("div");
      bottomO.className = "safe-area-overlay";
      bottomO.style.cssText = `top:${imgTop + iH - marginY}px;left:${imgLeft}px;width:${iW}px;height:${marginY}px;`;
      container.appendChild(bottomO);

      const leftO = document.createElement("div");
      leftO.className = "safe-area-overlay";
      leftO.style.cssText = `top:${safeTop}px;left:${imgLeft}px;width:${marginX}px;height:${safeH}px;`;
      container.appendChild(leftO);

      const rightO = document.createElement("div");
      rightO.className = "safe-area-overlay";
      rightO.style.cssText = `top:${safeTop}px;left:${imgLeft + iW - marginX}px;width:${marginX}px;height:${safeH}px;`;
      container.appendChild(rightO);

      const border = document.createElement("div");
      border.className = "safe-area-overlay safe-area-border";
      border.style.cssText = `left:${safeLeft}px;top:${safeTop}px;width:${safeW}px;height:${safeH}px;`;
      container.appendChild(border);
    }

    function openModal(modalId) {
      const modal = document.getElementById(modalId);
      if (modal && modal.parentNode !== document.body) {
        document.body.appendChild(modal);
      }
      modal.classList.add("active");
    }

    function closeModal(modalId) {
      const modal = document.getElementById(modalId);
      modal.classList.remove("active");
    }

    function generateSessionId() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const min = String(now.getMinutes()).padStart(2, "0");
      // Crockford base32 random suffix: 32^6 ≈ 1.07B combinations per minute.
      // Alphabet excludes I, L, O, U so customers/staff reading session IDs
      // aloud or copy-pasting from order properties can't confuse characters.
      const alphabet = "0123456789ABCDEFGHJKMNPQRSTVWXYZ";
      const bytes = crypto.getRandomValues(new Uint8Array(6));
      let rand = "";
      for (let i = 0; i < 6; i++) rand += alphabet[bytes[i] & 31];
      return `${yyyy}${mm}${dd}-${hh}${min}-${rand}`;
    }

    // HEIC → JPEG conversion via heic2any. Lazy-loaded from jsDelivr only when
    // a HEIC file is encountered, so non-HEIC uploaders pay zero cost.
    const HEIC2ANY_URL =
      "https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js";
    let heic2anyPromise = null;
    function loadHeic2any() {
      if (heic2anyPromise) return heic2anyPromise;
      heic2anyPromise = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = HEIC2ANY_URL;
        script.onload = () => {
          if (typeof window.heic2any === "function") resolve(window.heic2any);
          else reject(new Error("heic2any did not initialise"));
        };
        script.onerror = () => {
          heic2anyPromise = null;
          reject(new Error("Failed to load HEIC decoder"));
        };
        document.head.appendChild(script);
      });
      return heic2anyPromise;
    }

    function isHeic(file) {
      const type = (file.type || "").toLowerCase();
      if (type === "image/heic" || type === "image/heif") return true;
      const name = (file.name || "").toLowerCase();
      return name.endsWith(".heic") || name.endsWith(".heif");
    }

    async function maybeConvertHeic(file) {
      if (!isHeic(file)) return file;
      const heic2any = await loadHeic2any();
      const result = await heic2any({
        blob: file,
        toType: "image/jpeg",
        quality: 0.92,
      });
      const blob = Array.isArray(result) ? result[0] : result;
      const newName = (file.name || "image.jpg").replace(
        /\.(heic|heif)$/i,
        ".jpg",
      );
      return new File([blob], newName, { type: "image/jpeg" });
    }

    async function uploadToCloudinary(file, fileName, sessionId) {
      const url = "https://api.cloudinary.com/v1_1/djzc7ih0g/image/upload";
      const form = new FormData();
      form.append("upload_preset", "shopify-magnets");
      form.append("tags", "order_pending");
      form.append("public_id", `shopify_uploads/${sessionId}/${fileName}`);
      form.append("file", file);
      const res = await fetch(url, { method: "POST", body: form });
      if (!res.ok) throw new Error("Upload failed");
      return res.json();
    }

    function init(config) {
      const {
        productId,
        maxFiles,
        aspectRatio,
        landscapeRatio,
        portraitRatio,
        hasOrientation,
        variant,
      } = config;

      // Keep enough pre-crop resolution so the worst-case crop still yields
      // OUTPUT_MIN_SHORT_SIDE on its short side. maxRatio is the most extreme
      // crop aspect the user can pick (furthest from square).
      const maxRatio = hasOrientation
        ? Math.max(landscapeRatio, 1 / portraitRatio)
        : aspectRatio;
      const compressionTarget = Math.ceil(OUTPUT_MIN_SHORT_SIDE * maxRatio);

      let selectedFiles = [];
      let croppedFiles = [];
      let cropOrientations = [];
      let currentCropperInstance = null;
      let currentCropIndex = -1;
      let currentOrientation = "landscape";

      const actualFileInput = document.getElementById(
        `actual-file-input-${productId}`,
      );
      const customUploadButton = document.getElementById(
        `custom-upload-button-${productId}`,
      );
      const removeAllFilesButton = document.getElementById(
        "remove-all-files-btn",
      );
      const uploadStatus = document.getElementById(
        `upload-status-${productId}`,
      );
      const mediaUploadStatus = document.getElementById(
        `media-upload-status-${productId}`,
      );
      const fileCountDisplay = document.getElementById(
        `file-count-display-${productId}`,
      );
      const imageToCrop = document.getElementById("image-to-crop");
      const cropCancel = document.getElementById("crop-cancel");
      const cropApply = document.getElementById("crop-apply");
      const cropReset = document.getElementById("crop-reset");
      const uploadButton = document.getElementById("upload-btn-main");
      const uploadConfirmEl = document.getElementById("upload-confirm");
      const confirmUploadBtn = document.getElementById("confirm-upload-btn");
      const confirmCancelBtn = document.getElementById("confirm-cancel-btn");
      const removeAllConfirmEl = document.getElementById("remove-all-confirm");
      const removeAllConfirmBtn = document.getElementById(
        "remove-all-confirm-btn",
      );
      const removeAllCancelBtn = document.getElementById(
        "remove-all-cancel-btn",
      );
      const selectPhotosButton = document.getElementById(
        `select-photos-button-${productId}`,
      );
      const editModalCloseBtn = document.getElementById("edit-modal-close-btn");
      const footerActionsEl = document.querySelector(".modal-footer-actions");
      const uploadArea = document.querySelector(".upload-area");
      const uploadProgressEl = document.getElementById("upload-progress");
      const progressBarFill = document.getElementById("progress-bar-fill");
      const progressText = document.getElementById("progress-text");
      const uploadCompleteEl = document.getElementById("upload-complete");
      const processingIndicator = document.getElementById(
        "processing-indicator",
      );
      const processingTextEl =
        processingIndicator.querySelector(".processing-text");

      document
        .getElementById(`select-photos-modal-${productId}`)
        .classList.add(`variant-${variant}`);

      // Orientation elements (rectangle only)
      const orientationLandscapeBtn = hasOrientation
        ? document.getElementById("orientation-landscape")
        : null;
      const orientationPortraitBtn = hasOrientation
        ? document.getElementById("orientation-portrait")
        : null;

      function getAspectRatio() {
        if (hasOrientation) {
          return currentOrientation === "landscape"
            ? landscapeRatio
            : portraitRatio;
        }
        return aspectRatio;
      }

      function getDefaultRatio() {
        return hasOrientation ? landscapeRatio : aspectRatio;
      }

      // Drag and drop (background color via .dragover class in styles)
      uploadArea.addEventListener("dragover", (e) => { e.preventDefault(); uploadArea.classList.add("dragover"); });
      uploadArea.addEventListener("dragleave", (e) => { e.preventDefault(); uploadArea.classList.remove("dragover"); });
      uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadArea.classList.remove("dragover");
        const files = Array.from(e.dataTransfer.files);
        if (files.length) addFilesToFileInput(files);
      });

      customUploadButton.addEventListener("click", () => actualFileInput.click());

      const showConfirm = (el, show) => {
        el.classList.toggle("active", show);
        footerActionsEl.style.display = show ? "none" : "flex";
      };

      removeAllFilesButton.addEventListener("click", () => {
        uploadStatus.textContent = "";
        showConfirm(removeAllConfirmEl, true);
      });
      removeAllCancelBtn.addEventListener("click", () => showConfirm(removeAllConfirmEl, false));
      removeAllConfirmBtn.addEventListener("click", () => {
        showConfirm(removeAllConfirmEl, false);
        removeAllFiles();
      });

      uploadButton.addEventListener("click", () => {
        uploadStatus.textContent = "";
        if (croppedFiles.length < maxFiles) {
          mediaUploadStatus.textContent = `You have ${croppedFiles.length} chosen images. Please select exactly ${maxFiles} images before uploading.`;
          return;
        }
        mediaUploadStatus.textContent = "";
        showConfirm(uploadConfirmEl, true);
      });

      confirmCancelBtn.addEventListener("click", () => showConfirm(uploadConfirmEl, false));

      confirmUploadBtn.addEventListener("click", async () => {
        showConfirm(uploadConfirmEl, false);
        uploadButton.disabled = true;
        uploadButton.textContent = "Uploading...";
        removeAllFilesButton.style.display = "none";
        mediaUploadStatus.textContent = "";
        uploadProgressEl.classList.add("active");
        progressBarFill.style.display = "block";
        progressBarFill.style.width = "0%";
        uploadCompleteEl.classList.remove("active");

        const sessionId = generateSessionId();
        let uploadedCount = 0;
        let hasError = false;

        for (let index = 0; index < croppedFiles.length; index++) {
          try {
            progressText.textContent = `Uploading ${index + 1} of ${croppedFiles.length}...`;
            progressBarFill.style.width = `${(index / croppedFiles.length) * 100}%`;
            const fileName = String(index + 1).padStart(2, "0");
            await uploadToCloudinary(croppedFiles[index], fileName, sessionId);
            uploadedCount++;
            progressBarFill.style.width = `${(uploadedCount / croppedFiles.length) * 100}%`;
          } catch (error) {
            hasError = true;
            break;
          }
        }

        await new Promise((resolve) => setTimeout(resolve, 1000));
        uploadProgressEl.classList.remove("active");

        if (hasError) {
          mediaUploadStatus.textContent = `Upload failed on image ${uploadedCount + 1}. Please try again.`;
          uploadButton.disabled = false;
          uploadButton.textContent = "Upload";
          if (selectedFiles.length > 0)
            removeAllFilesButton.style.display = "block";
        } else {
          uploadCompleteEl.classList.add("active");
          uploadButton.textContent = "Done";
          uploadButton.disabled = false;
          selectPhotosButton.textContent = "Photos uploaded";
          document.dispatchEvent(
            new CustomEvent("photosUploaded", {
              detail: { sessionId, productId, variant },
            }),
          );
          uploadButton.onclick = () =>
            closeModal(`select-photos-modal-${productId}`);
        }
      });

      function addFilesToFileInput(files) {
        const newFiles = Array.from(files);
        if (selectedFiles.length + newFiles.length > maxFiles) {
          uploadStatus.textContent = `You can only upload a maximum of ${maxFiles} images.`;
          return;
        }
        processNewFiles(newFiles);
      }

      actualFileInput.addEventListener("change", (e) => {
        addFilesToFileInput(Array.from(e.target.files));
      });

      // Orientation toggle (rectangle only)
      function updateOrientationToggle() {
        if (!hasOrientation) return;
        if (currentOrientation === "landscape") {
          orientationLandscapeBtn.classList.add("active");
          orientationPortraitBtn.classList.remove("active");
        } else {
          orientationLandscapeBtn.classList.remove("active");
          orientationPortraitBtn.classList.add("active");
        }
      }

      if (hasOrientation && orientationLandscapeBtn) {
        orientationLandscapeBtn.addEventListener("click", () => {
          if (!currentCropperInstance || currentOrientation === "landscape")
            return;
          currentOrientation = "landscape";
          updateOrientationToggle();
          currentCropperInstance.setAspectRatio(landscapeRatio);
          drawSafeArea();
        });
      }

      if (hasOrientation && orientationPortraitBtn) {
        orientationPortraitBtn.addEventListener("click", () => {
          if (!currentCropperInstance || currentOrientation === "portrait")
            return;
          currentOrientation = "portrait";
          updateOrientationToggle();
          currentCropperInstance.setAspectRatio(portraitRatio);
          drawSafeArea();
        });
      }

      function startCropping(index) {
        uploadStatus.textContent = "";
        currentCropIndex = index;
        const file = selectedFiles[index];
        if (hasOrientation) {
          currentOrientation = cropOrientations[index] || "landscape";
          updateOrientationToggle();
        }
        const ratio = getAspectRatio();
        const objectUrl = URL.createObjectURL(file);

        imageToCrop.onload = function () {
          currentCropperInstance = new Cropper(imageToCrop, {
            aspectRatio: ratio,
            viewMode: 1,
            guides: true,
            autoCropArea: 0.8,
            movable: true,
            rotatable: true,
            scalable: true,
            zoomable: true,
            ready: () => drawSafeArea(),
            cropmove: () => drawSafeArea(),
          });
        };
        imageToCrop.src = objectUrl;
      }

      cropApply.addEventListener("click", () => {
        if (!currentCropperInstance) return;
        const cropData = currentCropperInstance.getData();
        const srcW = Math.round(cropData.width);
        const srcH = Math.round(cropData.height);
        const shortSide = Math.min(srcW, srcH);
        const scale = Math.min(OUTPUT_MIN_SHORT_SIDE / shortSide, 1);
        const width = Math.round(srcW * scale);
        const height = Math.round(srcH * scale);

        const croppedCanvas = currentCropperInstance.getCroppedCanvas({
          width,
          height,
          fillColor: "#fff",
        });

        if (hasOrientation)
          cropOrientations[currentCropIndex] = currentOrientation;

        croppedCanvas.toBlob(
          (blob) => {
            croppedFiles[currentCropIndex] = new File(
              [blob],
              selectedFiles[currentCropIndex].name,
              {
                type: "image/jpeg",
                lastModified: new Date().getTime(),
              },
            );
            currentCropperInstance.destroy();
            currentCropperInstance = null;
            closeEditModal();
          },
          "image/jpeg",
          0.92,
        );
      });

      cropCancel.addEventListener("click", () => {
        if (currentCropperInstance) {
          currentCropperInstance.destroy();
          currentCropperInstance = null;
        }
        closeEditModal();
      });

      cropReset.addEventListener("click", () => {
        if (!currentCropperInstance) return;
        currentCropperInstance.reset();
        requestAnimationFrame(drawSafeArea);
      });

      editModalCloseBtn.addEventListener("click", () => {
        if (currentCropperInstance) {
          currentCropperInstance.destroy();
          currentCropperInstance = null;
        }
        closeEditModal();
      });

      function closeEditModal() {
        const cropModal = document.getElementById("edit-photos-modal");
        cropModal.classList.remove("active");
        imageToCrop.src = "";
        currentCropIndex = -1;
        closeModal("edit-photos-modal");
        processThumbnails();
      }

      function updateUploadUI() {
        fileCountDisplay.textContent = `${selectedFiles.length}/${maxFiles} images selected`;
        const ready = selectedFiles.length === maxFiles;
        document.querySelector(".remove-all-files-btn").style.display =
          selectedFiles.length === 0 ? "none" : "block";
        uploadArea.style.display = ready ? "none" : "flex";
        document.querySelector(".post-selection-info").style.display = ready ? "flex" : "none";
        const bulkClickInstruction = document.querySelector(".bulk-click-instruction");
        if (bulkClickInstruction) bulkClickInstruction.style.display = ready ? "block" : "none";
        uploadButton.disabled = !ready;
      }

      async function compressImage(
        file,
        index,
        minShortSide = 2000,
        quality = 0.92,
      ) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = () => reject(new Error("Failed to read file"));
          reader.onload = (e) => {
            const img = new Image();
            img.onerror = () => reject(new Error("Image format not supported"));
            img.onload = () => {
              const canvas = document.createElement("canvas");
              const ctx = canvas.getContext("2d");
              const shortSide = Math.min(img.width, img.height);
              const scale = Math.min(minShortSide / shortSide, 1);
              canvas.width = Math.round(img.width * scale);
              canvas.height = Math.round(img.height * scale);
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              canvas.toBlob((blob) => resolve(blob), "image/jpeg", quality);
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      function createDefaultCrop(blob) {
        return new Promise((resolve, reject) => {
          const url = URL.createObjectURL(blob);
          const img = new Image();
          img.onerror = () => {
            URL.revokeObjectURL(url);
            reject(new Error("Image format not supported"));
          };
          img.onload = () => {
            URL.revokeObjectURL(url);
            const targetRatio = getDefaultRatio();
            let cropWidth, cropHeight;
            if (img.width / img.height > targetRatio) {
              cropHeight = img.height;
              cropWidth = cropHeight * targetRatio;
            } else {
              cropWidth = img.width;
              cropHeight = cropWidth / targetRatio;
            }
            const canvas = document.createElement("canvas");
            canvas.width = cropWidth;
            canvas.height = cropHeight;
            const ctx = canvas.getContext("2d");
            const sx = (img.width - cropWidth) / 2;
            const sy = (img.height - cropHeight) / 2;
            ctx.drawImage(
              img,
              sx,
              sy,
              cropWidth,
              cropHeight,
              0,
              0,
              cropWidth,
              cropHeight,
            );
            canvas.toBlob(
              (croppedBlob) => resolve(croppedBlob),
              "image/jpeg",
              0.92,
            );
          };
          img.src = url;
        });
      }

      async function processNewFiles(files) {
        if (files.length === 0) return;
        processingTextEl.textContent =
          files.length === 1
            ? "Processing image..."
            : `Processing image 1 of ${files.length}...`;
        processingIndicator.classList.add("active");
        uploadStatus.textContent = "";

        const initialLength = selectedFiles.length;
        const skipped = [];
        let writeIndex = initialLength;
        for (let i = 0; i < files.length; i++) {
          if (files.length > 1) {
            processingTextEl.textContent = `Processing image ${i + 1} of ${files.length}...`;
          }
          try {
            const fileToProcess = await maybeConvertHeic(files[i]);
            const compressed = await compressImage(
              fileToProcess,
              writeIndex,
              compressionTarget,
            );
            const cropped = await createDefaultCrop(compressed);
            selectedFiles[writeIndex] = compressed;
            croppedFiles[writeIndex] = cropped;
            if (hasOrientation) cropOrientations[writeIndex] = "landscape";
            writeIndex++;
          } catch (err) {
            skipped.push(files[i].name || `file ${i + 1}`);
          }
        }

        processingIndicator.classList.remove("active");
        if (skipped.length) {
          const list = skipped.map((n) => `"${n}"`).join(", ");
          uploadStatus.textContent =
            `Couldn't process ${skipped.length} file${skipped.length === 1 ? "" : "s"} (${list}). ` +
            "Some image formats don't load in browsers - most often unusual HEIC variants or RAW files (from cameras). " +
            "Other formats may also fail. " +
            "Please save as JPEG or PNG and try again.";
        }
        processThumbnails();
        updateUploadUI();
      }

      function processThumbnails() {
        const container = document.querySelector(".main-thumbnail-container");
        if (!container) return;
        container.innerHTML = "";

        const maxFilesAdded = selectedFiles.length === maxFiles;
        const containers = new Array(selectedFiles.length);
        let imagesLoaded = 0;

        selectedFiles.forEach((file, index) => {
          const sourceFile = croppedFiles[index] || file;
          const reader = new FileReader();
          reader.onerror = () => {
            imagesLoaded++;
            if (imagesLoaded === selectedFiles.length) {
              containers.forEach((c) => {
                if (c) container.appendChild(c);
              });
            }
          };
          reader.onload = (e) => {
            const actionButtons = document.createElement("div");
            actionButtons.className = "thumbnail-action-buttons";

            const editBtn = document.createElement("button");
            editBtn.className = "thumbnail-action-btn";
            editBtn.title = "Edit";
            editBtn.innerHTML = `<svg viewBox="0 0 20 20" fill="none"><path d="M4 13.5V16h2.5l7.06-7.06-2.5-2.5L4 13.5z" stroke="currentColor" stroke-width="1.5"/><path d="M14.06 6.44a1.5 1.5 0 0 0 0-2.12l-1.38-1.38a1.5 1.5 0 0 0-2.12 0l-1.06 1.06 3.5 3.5 1.06-1.06z" stroke="currentColor" stroke-width="1.5"/></svg>`;
            editBtn.onclick = (ev) => {
              ev.stopPropagation();
              openModal("edit-photos-modal");
              startCropping(index);
            };

            const deleteBtn = document.createElement("button");
            deleteBtn.className = "thumbnail-action-btn";
            deleteBtn.title = "Remove";
            deleteBtn.innerHTML = `<svg viewBox="0 0 20 20" fill="none"><path d="M6 8v6m4-6v6m4-10v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V4m5-2h-2a2 2 0 0 0-2 2v2h8V4a2 2 0 0 0-2-2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
            deleteBtn.onclick = (ev) => {
              ev.stopPropagation();
              removeFile(index);
            };

            actionButtons.appendChild(editBtn);
            actionButtons.appendChild(deleteBtn);

            const imgContainer = document.createElement("div");
            imgContainer.className = "main-thumbnail-img-container";
            imgContainer.style.position = "relative";
            imgContainer.dataset.orientation =
              cropOrientations[index] || "landscape";

            const imgElement = document.createElement("img");
            imgElement.src = e.target.result;
            imgElement.className = "main-thumbnail";
            imgElement.onclick = (ev) => {
              ev.stopPropagation();
              openModal("edit-photos-modal");
              startCropping(index);
            };

            imgContainer.appendChild(imgElement);
            imgContainer.appendChild(actionButtons);
            containers[index] = imgContainer;
            imagesLoaded++;

            if (imagesLoaded === selectedFiles.length) {
              containers.forEach((c) => {
                if (c) container.appendChild(c);
              });
              if (maxFilesAdded) {
                const images = container.querySelectorAll("img");
                let renderedCount = 0;
                images.forEach((img) => {
                  if (img.complete) {
                    renderedCount++;
                    if (renderedCount === images.length)
                      handleSafeAreaOverlay();
                  } else {
                    img.onload = () => {
                      renderedCount++;
                      if (renderedCount === images.length)
                        handleSafeAreaOverlay();
                    };
                  }
                });
              }
            }
          };
          reader.readAsDataURL(sourceFile);
        });
      }

      function safeAreaFracs(orient) {
        if (variant === "square") return [50 / 55, 50 / 55];
        return orient === "portrait" ? [54 / 59, 78 / 83] : [78 / 83, 54 / 59];
      }

      function handleSafeAreaOverlay() {
        document.querySelectorAll(".main-thumbnail-img-container").forEach((c) => {
          const [x, y] = safeAreaFracs(c.dataset.orientation || "landscape");
          drawSafeAreaOverlay(c, x, y);
        });
      }

      window.addEventListener("resize", () => {
        const modal = document.querySelector(".select-photos-modal.active");
        if (modal) {
          document
            .querySelectorAll(".safe-area-overlay")
            .forEach((el) => el.remove());
          handleSafeAreaOverlay();
        }
      });

      function drawSafeArea() {
        if (!currentCropperInstance) return;
        const existing = document.querySelector(".safe-print-container");
        if (existing) existing.remove();

        const cropBox = currentCropperInstance.getCropBoxData();
        const safeW = cropBox.width * SAFE_AREA_PERCENTAGE;
        const safeH = cropBox.height * SAFE_AREA_PERCENTAGE;
        const safeLeft = (cropBox.width * (1 - SAFE_AREA_PERCENTAGE)) / 2;
        const safeTop = (cropBox.height * (1 - SAFE_AREA_PERCENTAGE)) / 2;

        const container = document.createElement("div");
        container.className = "safe-print-container";
        container.style.cssText = `left:${cropBox.left}px;top:${cropBox.top}px;width:${cropBox.width}px;height:${cropBox.height}px;`;

        const label = document.createElement("div");
        label.className = "safe-print-label";
        label.textContent = "Safe Print Area";
        container.appendChild(label);

        const area = document.createElement("div");
        area.className = "safe-print-area";
        area.style.cssText = `left:${safeLeft}px;top:${safeTop}px;width:${safeW}px;height:${safeH}px;`;
        container.appendChild(area);

        document.querySelector(".cropper-container").appendChild(container);
      }

      function removeFile(index) {
        if (index < 0 || index >= selectedFiles.length) return;
        uploadStatus.textContent = "";
        selectedFiles.splice(index, 1);
        croppedFiles.splice(index, 1);
        if (hasOrientation) cropOrientations.splice(index, 1);
        if (selectedFiles.length === 0) actualFileInput.value = "";
        processThumbnails();
        updateUploadUI();
      }

      function removeAllFiles() {
        selectedFiles = [];
        croppedFiles = [];
        cropOrientations = [];
        actualFileInput.value = "";
        processThumbnails();
        updateUploadUI();
      }

    }

    return {
      init,
      RECTANGLE_RATIO,
      OUTPUT_MIN_SHORT_SIDE,
      drawSafeAreaOverlay,
      openModal,
      closeModal,
      uploadToCloudinary,
      maybeConvertHeic,
    };
  })();
</script>
